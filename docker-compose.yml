services:
  # ============================================
  # eCitizen SCC Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecitizen-api
    ports:
      - "${PORT:-4010}:4010"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4010
      - DATABASE_URL=postgresql://${DB_USERNAME:-ecitizen}:${DB_PASSWORD:-ecitizen_pass}@postgres:5432/${DB_NAME:-ecitizen_scc}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-2h}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-30d}
      - BREVO_API_KEY=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
      - BREVO_FROM_EMAIL=noreply@ecitizen.go.ke
      - BREVO_FROM_NAME=eCitizen SCC
      - BONGA_SMS_URL=http://167.172.14.50:4002/v1/send-sms
      - BONGA_CLIENT_ID=819
      - BONGA_API_KEY=fSUC6k4NB10aooc
      - BONGA_API_SECRET=ATXnjDoluHZ3IdGtqwPxUbqRLv0veL
      - BONGA_SERVICE_ID=5982
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-af-south-1}
      - S3_BUCKET=${S3_BUCKET:-ecitizen-scc-media}
      - CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN:-}
      - CLOUDFRONT_ENABLED=${CLOUDFRONT_ENABLED:-false}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3010,http://localhost:3011,http://18.190.206.56:3010,http://18.190.206.56:3011}
      - CLIENT_URL=${CLIENT_URL:-http://18.190.206.56:3010}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-https://admin-ecitizen.wasaahost.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ecitizen-network

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: ecitizen-postgres
    ports:
      - "${DB_PORT:-5442}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ecitizen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecitizen_pass}
      POSTGRES_DB: ${DB_NAME:-ecitizen_scc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ecitizen} -d ${DB_NAME:-ecitizen_scc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecitizen-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ecitizen-redis
    ports:
      - "${REDIS_PORT:-6389}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecitizen-network

  # ============================================
  # Kafka (KRaft — no Zookeeper)
  # ============================================
  kafka:
    image: apache/kafka:3.8.0
    container_name: ecitizen-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "ecitizen-kafka-cluster-01"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - ecitizen-network

  # ============================================
  # Kafka UI — monitor topics, messages, consumers
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ecitizen-kafka-ui
    ports:
      - "9095:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=ecitizen-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecitizen-network

volumes:
  postgres_data:
  redis_data:
  media_uploads:
  kafka_data:

networks:
  ecitizen-network:
    external: true
